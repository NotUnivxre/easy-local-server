<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Local Server</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Easy Local Server</h1>
            <div class="controls">
                <button id="startBtn" class="btn-green">Start Server</button>
                <button id="stopBtn" class="btn-red">Stop Server</button>
            </div>
        </header>
        
        <main>
            <div class="terminal-container">
                <div id="terminal"></div>
                <form id="commandForm">
                    <input type="text" id="cmdInput" placeholder="Ketik command di sini (cth: say Halo)..." autocomplete="off">
                    <button type="submit">Send</button>
                </form>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
