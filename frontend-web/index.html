<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Local Server</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
</head>
<body>
    <div class="app-container">
        <nav class="sidebar">
            <div class="brand">
                <h2>Easy Local Server</h2>
            </div>
            <ul class="nav-links">
                <li class="active" onclick="switchTab('home')">Dashboard</li>
                <li onclick="switchTab('options')">Options</li>
                <li onclick="switchTab('files')">Files</li>
            </ul>
            <div class="sidebar-footer">
                <p>Status: <span id="serverStatus" class="status-offline">Offline</span></p>
            </div>
        </nav>

        <main class="content">
            <header class="top-bar">
                <h1 id="pageTitle">Dashboard</h1>
                <div class="controls">
                    <button id="startBtn" class="btn-green">Start</button>
                    <button id="restartBtn" class="btn-yellow">Restart</button>
                    <button id="stopBtn" class="btn-red">Stop</button>
                </div>
            </header>

            <div id="home" class="tab-content active-tab">
                <div class="dashboard-grid">
                    <div class="terminal-card">
                        <div class="terminal-container">
                            <div id="terminal"></div>
                            <form id="commandForm">
                                <input type="text" id="cmdInput" placeholder="Ketik command di sini (cth: say Halo)..." autocomplete="off">
                                <button type="submit">Send</button>
                            </form>
                        </div>
                    </div>
                    <div class="stats-sidebar">
                        <div class="stat-card">
                            <span class="stat-label">Address (Playit.gg)</span>
                            <input type="text" id="playitAddress" class="address-input" placeholder="Masukkan IP Playit.gg...">
                        </div>
                        <div class="stat-card">
                            <span class="stat-label">RAM Usage (PC)</span>
                            <h3 id="ramUsage">0 MB / 0 GB</h3>
                        </div>
                    </div>
                </div>
            </div>

            <div id="options" class="tab-content hidden">
                <div class="options-grid">
                    <div class="opt-card">
                        <label>RAM Allocation (MB)</label>
                        <input type="number" id="opt-ram" placeholder="Contoh: 2048" step="1024">
                    </div>
                    <div class="opt-card">
                        <label>Max Players (Slots)</label>
                        <input type="number" id="opt-slots">
                    </div>
                    <div class="opt-card">
                        <label>Gamemode</label>
                        <select id="opt-gamemode">
                            <option value="survival">Survival</option>
                            <option value="creative">Creative</option>
                            <option value="adventure">Adventure</option>
                            <option value="spectator">Spectator</option>
                        </select>
                    </div>
                    <div class="opt-card">
                        <label>Difficulty</label>
                        <select id="opt-difficulty">
                            <option value="peaceful">Peaceful</option>
                            <option value="easy">Easy</option>
                            <option value="normal">Normal</option>
                            <option value="hard">Hard</option>
                        </select>
                    </div>
                    <div class="opt-card">
                        <label>Cracked (Online Mode)</label>
                        <select id="opt-online">
                            <option value="true">Premium Only (True)</option>
                            <option value="false">Cracked Allowed (False)</option>
                        </select>
                    </div>
                </div>
                <button class="btn-save" style="margin-top: 20px;">Save Options</button>
            </div>

            <div id="files" class="tab-content hidden">
                <div class="file-manager" id="fileManagerZone">
                    <div class="file-header">
                        <span id="currentPathText">/minecraft/</span>
                        <div>
                            <button class="btn-yellow" id="btnUpFolder" style="display:none; padding: 5px 10px; font-size: 12px; margin-right: 5px;">⬅ Back</button>
                            <button class="btn-green" id="btnUploadClick" style="padding: 5px 10px; font-size: 12px;">📤 Upload</button>
                        </div>
                        <input type="file" id="fileInput" style="display: none;">
                    </div>
                    <div class="file-list" id="fileContainer">
                        <p style="padding: 10px; color: #888;">Memuat files...</p>
                    </div>
                </div>
                <p style="color: #666; font-size: 12px; margin-top: 10px; text-align: center;">💡 Kamu juga bisa Drag & Drop file ke dalam kotak di atas!</p>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
